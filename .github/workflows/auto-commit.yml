name: Auto Commit Farm

on:
  schedule:
    - cron: '0 * * * *'  # Runs exactly at the top of every hour
  workflow_dispatch:     # Allows for manual testing

jobs:
  auto_commit:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Make a dummy change with random quote 
        run: |
          QUOTES=(
            "It ain't much, but it's honest work. 🚜"
            "Another day, another green square harvested. 🌾"
            "Just a humble farmer tending to my commits. 🧑‍🌾"
            "Adding some fertilizer to the contribution graph. 💩"
            "Green squares don't grow themselves... wait, yes they do. 😂"
            "Aura points +1000 for this commit. ✨"
            "Tractor engine is purring perfectly. 🚜💨"
            "Waking up early to feed the repository. 🐔"
            "The harvest is bountiful this hour. 🌽"
            "Commiting while the sun is high. ☀️"
            "Watering my pixels daily. 💧"
            "If it works, don't touch the tractor. 🛠️"
            "My code is organic and locally grown. 🍎"
            "Just another brick in the green wall. 🧱"
            "Cyber-farming is the future. 🦾"
            "POV: You're a bot and life is good. 🤖"
            "I'm out-standing in my field. Literally. 🌽"
            "Git pull, Git push, Git paid. 💸"
            "Everything is fine, the bot is in control. 🕹️"
            "Building a digital ecosystem, one pixel at a time. 🌍"
            "The compiler is my weather report. ⛈️"
            "Sowing seeds of code. 🌻"
            "Harvesting logic gates. ⚡"
            "Don't mind me, just keeping the streak alive. 🔥"
            "Sleep is for people who don't have cron jobs. ☕"
            "Commit history go brrr. 📈"
            "Is this the real life? Is this just automation? 🎤"
            "Another hour, another square. No cap. 🧢"
            "Carolinian pride in every commit. 🦁"
            "Headless farm for a headless developer. 💀"
            "The soil is digital, but the grind is real. 🌱"
            "Every commit is a seed for tomorrow. 🌾"
            "Farm life, but make it version-controlled. 🧑‍🌾"
            "Till, commit, repeat. 🔁"
            "Rain or shine, the repo grows. ☔🌞"
            "Just one more commit… I said that yesterday. 😅"
            "The field never sleeps, and neither do I. 🌙"
            "Photosynthesizing green squares like a pro. 🌿"
            "Welcome to my pixel farm. 🎮"
            "Debugging crops instead of bugs. 🐛➡️🌽"
            "Git is my irrigation system. 💧"
            "Powered by caffeine and crop rotations. ☕🚜"
            "These commits are homegrown. 🏡"
            "From seed to repo, full cycle farming. 🔄"
            "Ctrl + S = watering the crops. 💾"
            "The harvest leaderboard is looking clean. 📊"
            "Another patch of green successfully grown. 🟩"
            "Organic commits only, no AI fertilizer. 🌱"
            "Farming pixels like it’s my full-time job. 💻"
            "Planting ideas, harvesting bugs. 🌻🐞"
            "Staying consistent like crop seasons. 📆"
            "My farm is 100% open source. 🌍"
            "Green squares = digital crops. Simple math. ➕"
            "I don't farm gold, I farm commits. 🟩"
            "The repo is my farmland. 📁"
            "Just tending my code garden. 🌷"
            "Watering streaks like it's survival mode. 💦"
            "Each commit is a drop in the ocean of code. 🌊"
            "From dirt to deploy. 🚀"
            "I speak fluent agriculture and Git. 🧑‍🌾💻"
            "Harvest season never ends here. 🔥"
            "Automated farming, manual grind. ⚙️"
            "Growing my graph one square at a time. 📈"
            "Field work > real world sometimes. 😌"
            "Sunrise to sunset, still farming commits. 🌅"
            "Living in a loop: plant → code → commit. 🔁"
            "This is what digital agriculture looks like. 🌾"
            "Green pixels, green mindset. 💚"
            "Git farming is my cardio. 🏃‍♂️"
            "No weeds, only features. 🌱"
            "Stack overflow? Nah, stack harvest. 🌽"
            "Every push is a rainfall event. 🌧️"
            "My farm runs on version control. 🔧"
            "Harvesting progress like it’s XP. 🎮"
            "The field is quiet, but the repo is loud. 🔊"
            "One farm, infinite commits. ♾️"
            "Growing consistency, not just code. 📌"
            "Crop rotation = branch switching. 🌿"
            "Living that full-stack farming life. 🧑‍💻🌾"
            "Each green square tells a story. 📖"
            "From seed commit to full harvest. 🌱🚜"
            "Wrapped in a blanket, still farming commits. 🧺🌾"
            "The farm is quiet… but my Git isn’t. 🌙"
            "Soft vibes, hard commits. ☁️💻"
            "Just me, my hoodie, and infinite green squares. 🧥🌱"
            "Cozy coding season never ends. 🍵"
            "Farming in pajamas like it’s normal. 😌🚜"
            "The only crops I know are commits. 🌾"
            "Rain outside, green squares inside. 🌧️🟩"
            "Low energy, high consistency farm mode. 💤🌿"
            "My comfort zone is a well-grown repo. 🧑‍🌾"
            "Even my bugs feel cozy here. 🐛☕"
            "Silent farm hours hit different. 🌌"
            "Soft lights, soft grind, hard commits. 💡"
            "Just vibing with my digital crops. 🎧🌱"
            "The greenhouse is just my VS Code. 🪴"
            "Warm tea, cold nights, growing repo. 🍵🌙"
            "Cozy chaos in every commit. 🧶"
            "Sleeping farmer, active repo. 😴💻"
            "The soil is glowing tonight. ✨🌾"
            "Farm update: still vibing, still coding. 🔄"
            "One hoodie, one laptop, infinite harvest. 🧥🚜"
            "Green squares = emotional support crops. 💚"
            "Just a farmer avoiding real-life weeds. 🌿😆"
            "Everything grows except my sleep schedule. 😂🌱"
            "Cozy farm > social life sometimes. 🏡"
            "My crops are more consistent than me. 😭🌾"
            "Late night farming hits different. 🌌💻"
            "I farm commits like it’s self-care. 🧘‍♂️🌱"
            "The field is warm tonight. 🔥🌾"
            "Soft grind, loud Git history. 🎧🟩"
          )
          
          RANDOM_QUOTE=${QUOTES[$RANDOM % ${#QUOTES[@]}]}
          
          echo "[$RANDOM_QUOTE] on $(date)" >> .commit_log
          echo "COMMIT_MSG=$RANDOM_QUOTE" >> $GITHUB_ENV

      - name: Commit and Push
        run: |
          git config --local user.name "ZRayce"
          git config --local user.email "zerorayce@gmail.com" 
          
          git add .commit_log
          git commit --author="ZRayce <zerorayce@gmail.com>" -m "$COMMIT_MSG"
          git push
